<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Financial Advisor 💰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>Ruya is here to help you! 💡</h1>
      <p>Ask me about: <strong>Budgeting 💸 • Saving 📈 • Lifestyle 🏖️ • Investments 💼</strong></p>
    </header>

    <main class="chat-container" id="chat-container">
      <div class="bot-message">
        👋 Hi there! I'm your personal AI Financial Advisor.  
        Ask me anything about spending, savings, or budgeting!
      </div>
    </main>

    <footer class="input-container">
      <input type="text" id="userInput" placeholder="Write your question here..." />
      <button id="sendBtn">➤</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
